<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ចុះឈ្មោះចូលរៀន - HUOKAING THARA INTERNATIONAL SCHOOL</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="register-style.css">
</head>
<body class="bg-blue-950 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-2xl max-w-lg w-full p-6 md:p-8 relative overflow-hidden">
        <!-- Decorative Header Accent -->
        <div class="absolute top-0 left-0 w-full h-2 bg-amber-400"></div>

        <!-- School Brand Identity -->
        <div class="text-center mb-6">
            <img src="school_logo.jpg" alt="School Logo" class="h-16 w-auto mx-auto object-contain rounded-full border-2 border-amber-400 mb-2">
            <h2 class="text-xl md:text-2xl font-bold text-blue-950">ចុះឈ្មោះបង្កើតគណនី</h2>
            <p class="text-xs text-gray-500 mt-1">បំពេញព័ត៌មានខាងក្រោមដើម្បីចូលរួមថ្នាក់រៀនអនឡាញ</p>
        </div>

        <!-- Registration Form -->
        <form id="registerForm" class="space-y-4">
            <!-- Full Name Input -->
            <div>
                <label for="fullName" class="block text-sm font-semibold text-gray-700 mb-1">ឈ្មោះពេញ (Full Name)</label>
                <input type="text" id="fullName" name="fullName" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-950 focus:border-transparent outline-none transition text-gray-800"
                    placeholder="ឧ. សុខ ជា">
            </div>

            <!-- Email Input -->
            <div>
                <label for="email" class="block text-sm font-semibold text-gray-700 mb-1">អាសយដ្ឋានអ៊ីមែល (Email)</label>
                <input type="email" id="email" name="email" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-950 focus:border-transparent outline-none transition text-gray-800"
                    placeholder="example@gmail.com">
            </div>

            <!-- Phone Number Input -->
            <div>
                <label for="phone" class="block text-sm font-semibold text-gray-700 mb-1">លេខទូរស័ព្ទ (Phone Number)</label>
                <input type="tel" id="phone" name="phone" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-950 focus:border-transparent outline-none transition text-gray-800"
                    placeholder="ឧ. 087204155">
            </div>

            <!-- Password Input -->
            <div>
                <label for="password" class="block text-sm font-semibold text-gray-700 mb-1">លេខកូដសម្ងាត់ (Password)</label>
                <input type="password" id="password" name="password" required minlength="6"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-950 focus:border-transparent outline-none transition text-gray-800"
                    placeholder="យ៉ាងតិច ៦ ខ្ទង់">
            </div>

            <!-- Custom Error/Success Alerts Area -->
            <div id="formAlert" class="hidden text-sm p-3 rounded-lg text-center font-medium"></div>

            <!-- Submit Button -->
            <button type="submit" 
                class="w-full bg-amber-400 hover:bg-amber-500 text-blue-950 font-bold py-2.5 px-4 rounded-lg transition duration-200 shadow-md transform hover:-translate-y-0.5 active:translate-y-0">
                ចុះឈ្មោះឥឡូវនេះ
            </button>
        </form>

        <!-- Footer Redirection Link -->
        <div class="mt-6 pt-4 border-t border-gray-100 text-center text-sm text-gray-600">
            មានគណនីរួចហើយមែនទេ? 
            <a href="login.html" class="text-blue-950 font-bold hover:text-amber-500 underline transition ml-1">ចូលប្រើប្រាស់នៅទីនេះ</a>
        </div>
    </div>

    <!-- JavaScript Link -->
    <script src="register-script.js"></script>
</body>
</html>
